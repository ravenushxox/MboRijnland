<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MboRijnland</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
#app{display:none}
#loginScreen{height:100vh;background:#9cab2f;display:flex;align-items:center;justify-content:center}
.box{background:white;padding:25px;border-radius:12px;width:90%;max-width:350px;box-shadow:0 4px 15px #0003}
input,button{width:100%;padding:12px;margin-top:10px;font-size:16px;box-sizing:border-box}
button{background:#9cab2f;border:0;border-radius:6px;font-weight:bold;cursor:pointer}
.header{background:#9cab2f;padding:22px;font-size:25px;display:flex;gap:20px;align-items:center}
.menu-btn{font-size:28px;cursor:pointer}
.side-menu{position:fixed;left:-260px;top:0;width:260px;height:100%;background:white;box-shadow:2px 0 10px #0004;transition:.3s;z-index:10}
.side-menu.open{left:0}
.side-menu h2{padding:20px;margin:0;background:#9cab2f}
.side-menu div{padding:17px;border-bottom:1px solid #eee;cursor:pointer}
.container{max-width:650px;margin:auto}
.card{background:white;border-bottom:1px solid #ddd;padding:16px}
.profile{text-align:center}
.profile img{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #9cab2f}
.circle{width:180px;height:180px;border-radius:50%;margin:20px auto;background:conic-gradient(#9cab2f 0% 84%,#ddd 84% 100%);display:flex;align-items:center;justify-content:center}
.circle-inner{width:120px;height:120px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:bold}
</style>
</head>

<body>

<section id="loginScreen">
  <div class="box">
    <h1>MboRijnland</h1>
    <input id="username" placeholder="E-mailadres">
    <input id="password" type="password" placeholder="Wachtwoord">
    <button onclick="login()">Inloggen</button>
  </div>
</section>

<section id="app">
  <div class="side-menu" id="menu"></div>

  <div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="title">Rooster</div>
  </div>

  <div class="container" id="content"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8w-UPr_hxhHmJhfLB4nbVV4G5td9UtdU",
  authDomain: "mborijnland-apps.firebaseapp.com",
  projectId: "mborijnland-apps",
  storageBucket: "mborijnland-apps.firebasestorage.app",
  messagingSenderId: "66361643845",
  appId: "1:66361643845:web:f921e31bf9479"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

let currentUser = null;

window.login = function(){
  const emailValue = document.getElementById("username").value.trim();
  const passwordValue = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, emailValue, passwordValue)
    .then((userCredential) => {
      currentUser = userCredential.user;

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";

      menuRender();
      showPage("rooster");
    })
    .catch((error) => {
      alert("Login fout: " + error.message);
    });
};

function isAdmin(){
  return currentUser && currentUser.email === "admin@mborijnland.nl";
}

function menuRender(){
  document.getElementById("menu").innerHTML = `
    <h2>Menu</h2>
    <div onclick="showPage('rooster')">Rooster</div>
    <div onclick="showPage('cijfers')">Cijfers</div>
    <div onclick="showPage('huiswerk')">Huiswerk</div>
    <div onclick="showPage('berichten')">Berichten</div>
    <div onclick="showPage('aanwezigheid')">Aanwezigheid</div>
    <div onclick="showPage('student')">Gegevens student</div>
    <div onclick="logout()">Uitloggen</div>
  `;
}

window.showPage = function(p){
  document.getElementById("title").innerText = p.charAt(0).toUpperCase() + p.slice(1);
  document.getElementById("menu").classList.remove("open");

  if(p==="rooster") loadRooster();
  if(p==="cijfers") loadCijfers();
  if(p==="huiswerk") loadHuiswerk();
  if(p==="berichten") loadBerichten();
  if(p==="aanwezigheid") loadAanwezigheid();
  if(p==="student") loadStudent();
};

function adminBtn(type){
  if(!isAdmin()) return "";
  return `<button onclick="addForm('${type}')">Toevoegen</button>`;
}

function loadRooster(){
  document.getElementById("content").innerHTML = adminBtn("rooster");

  onSnapshot(collection(db,"rooster"), snap => {
    let html = adminBtn("rooster");

    if(snap.empty){
      html += `<div class="card">Geen rooster gevonden.</div>`;
    }

    snap.forEach(doc => {
      let x = doc.data();
      html += `
        <div class="card">
          <b>${x.date || ""}</b><br>
          ${x.time || ""}<br>
          ${x.title || ""}<br>
          ${x.room || ""}
        </div>
      `;
    });

    document.getElementById("content").innerHTML = html;
  });
}

function loadCijfers(){
  document.getElementById("content").innerHTML = adminBtn("cijfers");

  onSnapshot(collection(db,"cijfers"), snap => {
    let html = adminBtn("cijfers");

    if(snap.empty){
      html += `<div class="card">Geen cijfers gevonden.</div>`;
    }

    snap.forEach(doc => {
      let x = doc.data();
      html += `
        <div class="card">
          <b>${x.vak || ""}</b><br>
          ${x.toets || ""}<br>
          Cijfer: <b>${x.cijfer || ""}</b>
        </div>
      `;
    });

    document.getElementById("content").innerHTML = html;
  });
}

function loadHuiswerk(){
  document.getElementById("content").innerHTML = `
    <div class="card"><b>Burgerschap</b><br>Maak opdracht 3 t/m 6</div>
  `;
}

function loadBerichten(){
  document.getElementById("content").innerHTML = `
    <div class="card"><b>Welkom</b><br>Welkom in de MboRijnland app.</div>
  `;
}

function loadAanwezigheid(){
  document.getElementById("content").innerHTML = `
    <div class="card profile">
      <h2>Aanwezigheid</h2>
      <div class="circle"><div class="circle-inner">84%</div></div>
      <p><b>84%</b> aanwezig</p>
      <p><b>16%</b> afwezig geoorloofd</p>
    </div>
  `;
}

function loadStudent(){
  document.getElementById("content").innerHTML = `
    <div class="card profile">
      <img src="https://via.placeholder.com/120">
      <h2>Anna Maria Elismparidou</h2>
    </div>
    <div class="card"><b>Naam:</b><br>Anna Maria Elismparidou</div>
    <div class="card"><b>Adres:</b><br>Lizststraat 312<br>2551TN Den Haag</div>
    <div class="card"><b>Telefoonnummer:</b><br>+31685794745</div>
    <div class="card"><b>E-mail:</b><br>elisbaridou@gmail.com</div>
    <div class="card"><b>SLB’er:</b><br>P. Van der Plas<br>K. Valkenduinen</div>
  `;
}

window.addForm = function(type){
  if(!isAdmin()){
    alert("Alleen admin mag toevoegen.");
    return;
  }

  if(type==="rooster"){
    document.getElementById("content").innerHTML = `
      <div class="card">
        <h3>Rooster toevoegen</h3>
        <input id="dateInput" placeholder="Datum">
        <input id="timeInput" placeholder="Tijd">
        <input id="titleInput" placeholder="Les">
        <input id="roomInput" placeholder="Lokaal">
        <button onclick="saveRooster()">Opslaan</button>
      </div>
    `;
  }

  if(type==="cijfers"){
    document.getElementById("content").innerHTML = `
      <div class="card">
        <h3>Cijfer toevoegen</h3>
        <input id="vakInput" placeholder="Vak">
        <input id="toetsInput" placeholder="Toets">
        <input id="cijferInput" placeholder="Cijfer">
        <button onclick="saveCijfer()">Opslaan</button>
      </div>
    `;
  }
};

window.saveRooster = async function(){
  await addDoc(collection(db,"rooster"),{
    date: document.getElementById("dateInput").value,
    time: document.getElementById("timeInput").value,
    title: document.getElementById("titleInput").value,
    room: document.getElementById("roomInput").value,
    createdAt: new Date()
  });

  showPage("rooster");
};

window.saveCijfer = async function(){
  await addDoc(collection(db,"cijfers"),{
    vak: document.getElementById("vakInput").value,
    toets: document.getElementById("toetsInput").value,
    cijfer: document.getElementById("cijferInput").value,
    createdAt: new Date()
  });

  showPage("cijfers");
};

window.toggleMenu = function(){
  document.getElementById("menu").classList.toggle("open");
};

window.logout = function(){
  signOut(auth).then(() => {
    currentUser = null;
    document.getElementById("app").style.display = "none";
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
  });
};
</script>

</body>
</html>
