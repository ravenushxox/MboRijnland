<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MboRijnland</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
#app{display:none}
#login{height:100vh;background:#9cab2f;display:flex;align-items:center;justify-content:center}
.box{background:white;padding:25px;border-radius:12px;width:90%;max-width:350px}
input,button{width:100%;padding:12px;margin-top:10px}
button{background:#9cab2f;border:0;border-radius:6px}
.header{background:#9cab2f;padding:20px;font-size:22px;display:flex;gap:20px}
.menu-btn{font-size:26px;cursor:pointer}
.side-menu{position:fixed;left:-260px;top:0;width:260px;height:100%;background:white;transition:.3s}
.side-menu.open{left:0}
.side-menu div{padding:15px;border-bottom:1px solid #eee;cursor:pointer}
.container{max-width:600px;margin:auto}
.card{background:white;padding:15px;border-bottom:1px solid #ddd}
.date{background:#eee;padding:10px;font-weight:bold}
</style>
</head>

<body>

<section id="login">
  <div class="box">
    <h1>MboRijnland</h1>
    <input id="username" placeholder="Email">
    <input id="password" type="password" placeholder="Wachtwoord">
    <button onclick="login()">Login</button>
  </div>
</section>

<section id="app">
  <div class="side-menu" id="menu"></div>

  <div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="pageTitle">Rooster</div>
  </div>

  <div class="container" id="content"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8w-UPr_hxhHmJhfLB4nbVV4",
  authDomain: "mborijnland-apps.firebaseapp.com",
  projectId: "mborijnland-apps",
  storageBucket: "mborijnland-apps.firebasestorage.app",
  messagingSenderId: "66361643845",
  appId: "1:66361643845:web:f921e31bf9479"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = function(){
  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    renderMenu();
    renderRooster();
  })
  .catch(e => alert(e.message));
};

function renderMenu(){
  document.getElementById("menu").innerHTML=`
    <div onclick="renderRooster()">Rooster</div>
    <div onclick="logout()">Uitloggen</div>
  `;
}

function renderRooster(){
  onSnapshot(collection(db,"rooster"),snap=>{
    let html="";
    snap.forEach(doc=>{
      let x=doc.data();
      html+=`
        <div class="date">${x.date}</div>
        <div class="card">${x.time}<br>${x.title}</div>
      `;
    });
    document.getElementById("content").innerHTML=html;
  });
}

window.toggleMenu = ()=>document.getElementById("menu").classList.toggle("open");

window.logout = ()=>{
  signOut(auth);
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="flex";
};
</script>

</body>
</html>
